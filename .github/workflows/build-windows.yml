name: Build olcrtc for Windows

on:
  workflow_dispatch:        # Запуск вручную кнопкой

jobs:
  build-windows:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'     # или 1.23.x, если хочешь

      - name: Install Mage
        run: go install github.com/magefile/mage@latest

      - name: Build for Windows amd64
        run: |
          echo "=== Starting Windows build ==="
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 mage buildCLI
          
          # Переименовываем для удобства
          mv build/olcrtc-windows-amd64.exe ./olcrtc-windows-amd64.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: olcrtc-windows-amd64
          path: ./olcrtc-windows-amd64.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          tag_name: windows-build-${{ github.run_number }}
          name: olcrtc Windows Build ${{ github.run_number }}
          draft: false
          prerelease: false
          files: ./olcrtc-windows-amd64.exe
