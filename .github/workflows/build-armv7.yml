name: Build olcrtc for ARMv7

on:
  workflow_dispatch:        # Позволяет запускать сборку вручную кнопкой

jobs:
  build-armv7:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'

      - name: Install ARM Cross-Compiler
        # Этого не было у прошлой ИИ! Без этого CGO сборка под ARM упадет.
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-linux-gnueabihf

      - name: Install Mage
        run: go install github.com/magefile/mage@latest

      - name: Build for Linux ARMv7
        run: |
          # Указываем Go использовать правильный компилятор
          export CC=arm-linux-gnueabihf-gcc
          export GOOS=linux
          export GOARCH=arm
          export GOARM=7
          export CGO_ENABLED=1
          
          echo "=== Starting build ==="
          mage buildCLI
          
          # Переименовываем и перемещаем в корень для удобства
          find build -type f -name "olcrtc*" -exec cp {} ./olcrtc-armv7 \;

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: armv7-build-${{ github.run_number }}
          name: olcrtc ARMv7 Build ${{ github.run_number }}
          draft: false
          prerelease: false
          files: ./olcrtc-armv7
