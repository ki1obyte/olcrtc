name: Build olcrtc for ARMv7 + Release

on:
  workflow_dispatch:        # Запуск вручную
  push:
    branches: [ main, master ]

jobs:
  build-armv7:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'

      - name: Install Mage
        run: go install github.com/magefile/mage@latest

      - name: Build for Linux ARMv7
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        run: |
          export GOOS=linux
          export GOARCH=arm
          export GOARM=7
          export CGO_ENABLED=1
          
          echo "=== Starting build ==="
          mage buildCLI
          
          # Переименовываем для удобства
          if [ -f build/olcrtc-linux-arm ]; then
            mv build/olcrtc-linux-arm build/olcrtc-armv7
          elif [ -f build/olcrtc ]; then
            mv build/olcrtc build/olcrtc-armv7
          fi
          
          ls -la build/

      # Шаг для генерации даты сборки
      - name: Set current date
        id: date
        run: echo "build_date=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      - name: Create Release and Upload Binary
        uses: softprops/action-gh-release@v2
        with:
          tag_name: armv7-latest
          name: olcrtc ARMv7 Latest Build
          draft: false
          prerelease: true
          files: build/olcrtc-armv7
          body: |
            Автоматическая сборка для ARMv7 (armv7l)
            Подходит для Realme C11 и других 32-битных устройств.
            
            Дата сборки: ${{ steps.date.outputs.build_date }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
