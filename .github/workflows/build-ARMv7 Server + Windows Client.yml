name: Build olcrtc (ARMv7 + Windows)

on:
  workflow_dispatch:        # Запуск вручную кнопкой

jobs:
  build-all:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'   # Используем стабильную 1.25, как у официальных разработчиков

      - name: Install ARM Cross-Compiler
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-linux-gnueabihf

      - name: Install Mage
        run: go install github.com/magefile/mage@latest

      - name: Build for Linux ARMv7 (Android Server)
        run: |
          export CC=arm-linux-gnueabihf-gcc
          export GOOS=linux
          export GOARCH=arm
          export GOARM=7
          export CGO_ENABLED=1
          
          echo "=== Starting ARMv7 build ==="
          mage buildCLI
          find build -type f -name "olcrtc*" -exec cp {} ./olcrtc-armv7 \;

      - name: Build for Windows (PC Client)
        run: |
          export GOOS=windows
          export GOARCH=amd64
          export CGO_ENABLED=0
          
          echo "=== Starting Windows build ==="
          mage buildCLI
          cp build/olcrtc-windows-amd64.exe ./olcrtc-windows-amd64.exe

      - name: Create Unified Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: olcrtc Build ${{ github.run_number }} (Android + Windows)
          draft: false
          prerelease: false
          # Здесь мы указываем, что в релиз нужно закинуть сразу оба файла
          files: |
            ./olcrtc-armv7
            ./olcrtc-windows-amd64.exe
